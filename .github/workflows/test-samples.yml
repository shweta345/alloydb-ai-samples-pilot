name: Test SQL Code Samples

on:
  schedule:
    # Run at 00:00 on day 1 of every 2nd month
    - cron: '0 0 1 */2 *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Debug - Print mock_server.py
      run: cat mock_server.py

    - name: Start Mock Server
      run: |
        python3 mock_server.py > mock_server.log 2>&1 &
        # Wait for mock server to be up
        until curl -s http://localhost:8080/ > /dev/null; do
          echo "Waiting for mock server..."
          sleep 1
        done
        echo "Mock server is up!"

    - name: Start AlloyDB Omni
      run: |
        docker run --name alloydb-omni \
          --add-host=host.docker.internal:host-gateway \
          -e POSTGRES_PASSWORD=postgres \
          -p 5432:5432 \
          -d google/alloydbomni:latest
        
        # Wait for DB to be ready
        until docker exec alloydb-omni pg_isready -U postgres; do
          echo "Waiting for AlloyDB Omni..."
          sleep 2
        done
        echo "AlloyDB Omni is ready!"

        # Enable ML Agent
        docker exec -i alloydb-omni psql -U postgres -d postgres -c "ALTER SYSTEM SET omni_enable_ml_agent_process = 'on';"
        
        # Restart container to apply GUC
        docker restart alloydb-omni

        # Wait for DB to be ready again
        until docker exec alloydb-omni pg_isready -U postgres; do
          echo "Waiting for AlloyDB Omni after restart..."
          sleep 2
        done
        echo "AlloyDB Omni is ready after restart!"

    - name: Run Setup
      run: |
        docker exec -i alloydb-omni psql -U postgres -d postgres < setup.sql

    - name: Run Tests
      run: |
        docker exec -i alloydb-omni psql -U postgres -d postgres < test_work_with_embeddings.sql
        docker exec -i alloydb-omni psql -U postgres -d postgres < test_ai_operators.sql

    - name: Print Mock Server Logs
      if: always()
      run: |
        if [ -f mock_server.log ]; then
          echo "=== Mock Server Logs ==="
          cat mock_server.log
        else
          echo "Mock server log file not found."
        fi
