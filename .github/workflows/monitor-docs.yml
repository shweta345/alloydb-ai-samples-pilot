name: Monitor Documentation Changes

on:
  schedule:
    # Run at 00:00 on day 1 of every 2nd month
    - cron: '0 0 1 */2 *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run monitor script
      run: |
        python monitor_doc.py
